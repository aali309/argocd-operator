apiVersion: v1
kind: Namespace
metadata:
  name: test-1-046-application-tracking
---
apiVersion: v1
kind: Namespace
metadata:
  name: guestbook
  labels:
    argocd.argoproj.io/managed-by: argocd-1
---
apiVersion: v1
kind: Namespace
metadata:
  name: guestbook-second
  labels:
    argocd.argoproj.io/managed-by: argocd-2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-application-controller-test
rules:
- apiGroups:
  - apps
  - ""
  - argoproj.io
  resources:
  - deployments
  - services
  - namespaces
  - applications
  - replicasets
  - pods
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-application-controller-test
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-application-controller-test
subjects:
- kind: ServiceAccount
  name: argocd-application-controller
  namespace: test-1-046-application-tracking
---
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: argocd-1
  namespace: test-1-046-application-tracking
spec:
  resourceTrackingMethod: annotation
  applicationTrackingAnnotations:
    installationID: "instance-1"
---
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: argocd-2
  namespace: test-1-046-application-tracking
spec:
  resourceTrackingMethod: annotation
  applicationTrackingAnnotations:
    installationID: "instance-2"
